<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPC Email Draft Tool</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f3f4f6;min-height:100vh;padding:2rem 1.5rem}
  h1{font-size:18px;font-weight:600;color:#111827;margin-bottom:1.5rem}
  .layout{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;align-items:start;max-width:1100px}
  .card{background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;padding:1.5rem;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .card-title{font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.07em;margin-bottom:1.25rem}
  .field{margin-bottom:1rem}
  .field:last-child{margin-bottom:0}
  .field-label{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px}
  .field-num{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:50%;background:#e5e7eb;font-size:10px;font-weight:600;color:#6b7280;flex-shrink:0}
  input[type=text],input[type=email],input[type=date]{display:block;width:100%;padding:9px 11px;font-size:13px;font-family:inherit;color:#111827;background:#ffffff;border:1.5px solid #d1d5db;border-radius:8px;outline:none;transition:border-color .15s,box-shadow .15s}
  input[type=text]:hover,input[type=email]:hover,input[type=date]:hover{border-color:#9ca3af}
  input[type=text]:focus,input[type=email]:focus,input[type=date]:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
  input::placeholder{color:#9ca3af}
  .radio-row{display:flex;gap:8px}
  .r-opt{flex:1;display:flex;align-items:center;gap:8px;padding:9px 12px;border:1.5px solid #d1d5db;border-radius:8px;cursor:pointer;transition:border-color .15s,background .15s;background:#ffffff;user-select:none}
  .r-opt:hover{border-color:#9ca3af;background:#f9fafb}
  .r-opt.active{border-color:#6366f1;background:#eef2ff}
  .r-dot{width:15px;height:15px;border-radius:50%;border:1.5px solid #d1d5db;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
  .r-opt.active .r-dot{border-color:#6366f1;background:#6366f1}
  .r-dot-inner{width:5px;height:5px;border-radius:50%;background:white;display:none}
  .r-opt.active .r-dot-inner{display:block}
  .r-label{font-size:13px;font-weight:500;color:#374151}
  .right-col{display:flex;flex-direction:column;gap:1rem}
  .mail-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px 16px;font-size:14px;font-weight:600;font-family:inherit;border:none;border-radius:9px;background:#6366f1;color:#ffffff;cursor:pointer;transition:background .15s;margin-bottom:.75rem}
  .mail-btn:hover{background:#4f46e5}
  .mail-btn:active{transform:scale(.99)}
  .mail-btn:disabled{opacity:.4;cursor:default}
  .hint{font-size:11px;color:#9ca3af;margin-bottom:.6rem;display:block}
  .email-preview{background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:8px;padding:1.1rem;font-size:13px;line-height:1.9;color:#374151}
  .email-para{margin-bottom:.9em}
  .email-para:last-child{margin-bottom:0}
  .sig-block{margin-top:.85rem;padding-top:.85rem;border-top:1px solid #e5e7eb;font-size:13px;line-height:1.75;color:#6b7280}
  .ref-highlight{background:#fef9c3;color:#854d0e;padding:1px 5px;border-radius:4px;font-weight:600}
  .date-highlight{background:#fce7f3;color:#9d174d;padding:1px 5px;border-radius:4px;font-weight:700}
  .bottom-row{display:flex;justify-content:flex-end;margin-top:.75rem}
  .btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;font-size:12px;font-weight:500;font-family:inherit;border:1.5px solid #d1d5db;border-radius:8px;background:#ffffff;color:#374151;cursor:pointer;transition:background .15s,border-color .15s;white-space:nowrap}
  .btn:hover{background:#f3f4f6;border-color:#9ca3af}
  .btn.copied{border-color:#16a34a;color:#16a34a;background:#f0fdf4}
  .empty-state{color:#9ca3af;font-size:13px;font-style:italic;padding:.5rem 0}
  @media(max-width:700px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<h1>NPC Email Draft Tool</h1>
<div class="layout">
  <div class="card">
    <div class="card-title">Application details</div>
    <div class="field">
      <div class="field-label"><span class="field-num">1</span> NPC reference number</div>
      <input type="text" id="npc" placeholder="e.g. 01543/2026/NP RED HILL Section 8 Block 72" oninput="update()">
    </div>
    <div class="field">
      <div class="field-label"><span class="field-num">2</span> CMP reference number</div>
      <input type="text" id="cmp" placeholder="e.g. CMP:02570027523" oninput="update()">
    </div>
    <div class="field">
      <div class="field-label"><span class="field-num">3</span> Applicant name</div>
      <input type="text" id="name" placeholder="First name" oninput="update()">
    </div>
    <div class="field">
      <div class="field-label"><span class="field-num">4</span> Applicant email</div>
      <input type="email" id="email" placeholder="applicant@example.com" oninput="update()">
    </div>
    <div class="field">
      <div class="field-label"><span class="field-num">5</span> Response due date</div>
      <input type="date" id="duedate" oninput="update()">
    </div>
    <div class="field">
      <div class="field-label"><span class="field-num">6</span> Issue type</div>
      <div class="radio-row">
        <div class="r-opt active" id="opt1" onclick="setOpt('1')">
          <div class="r-dot"><div class="r-dot-inner"></div></div>
          <span class="r-label">Email not matched</span>
        </div>
        <div class="r-opt" id="opt2" onclick="setOpt('2')">
          <div class="r-dot"><div class="r-dot-inner"></div></div>
          <span class="r-label">Owner not matching</span>
        </div>
      </div>
    </div>
  </div>

  <div class="right-col">
    <div class="card">
      <div class="card-title">Draft email</div>
      <button class="mail-btn" id="open-btn" onclick="openInMail()" disabled>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="3" width="14" height="10" rx="1.5" stroke="white" stroke-width="1.4"/><path d="M1.5 4L8 9.5L14.5 4" stroke="white" stroke-width="1.4" stroke-linecap="round"/></svg>
        Open in mail client ↗
      </button>
      <span class="hint" id="mail-hint">Fill in details on the left to generate draft</span>
      <div id="email-body"><div class="empty-state">Your email preview will appear here.</div></div>
      <div class="bottom-row">
        <button class="btn" id="copy-email-btn" onclick="copyEmail()">Copy email body</button>
      </div>
    </div>
  </div>
</div>

<script>
var _opt = '1';
var SIG = 'Regards\nBibek Ligal\nTeam Leader - Builder Services\nCustomer Engagement Group\n\nT: 02 6180 3111';
var DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function formatDate(val) {
  if (!val) return null;
  var parts = val.split('-');
  var d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
  return DAYS[d.getDay()] + ' ' + d.getDate() + ' ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear();
}

function setOpt(v) {
  _opt = v;
  document.getElementById('opt1').className = 'r-opt' + (v === '1' ? ' active' : '');
  document.getElementById('opt2').className = 'r-opt' + (v === '2' ? ' active' : '');
  update();
}

function vals() {
  return {
    npc: document.getElementById('npc').value.trim(),
    cmp: document.getElementById('cmp').value.trim(),
    name: document.getElementById('name').value.trim(),
    email: document.getElementById('email').value.trim(),
    duedate: document.getElementById('duedate').value,
    opt: _opt
  };
}

function getSubject(v) {
  var parts = [];
  if (v.npc) parts.push(v.npc);
  if (v.cmp) parts.push(v.cmp);
  return parts.join(' ');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function hilite(text, ref) {
  if (!ref) return esc(text);
  var et = esc(text);
  var er = esc(ref).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return et.replace(new RegExp('(' + er + ')', 'g'), '<span class="ref-highlight">$1</span>');
}

function getBodyParas(v) {
  var ref = v.npc || '[NPC reference]';
  var nm = v.name || '[Applicant name]';
  var dateStr = formatDate(v.duedate) || '[due date]';
  var p3, p4;
  if (v.opt === '1') {
    p3 = 'The submitted property owner email address does not match our existing records, and we are unable to proceed with the application.';
    p4 = 'Please provide the property owner email address (by return email) so we can update the application and proceed with assessment.';
  } else {
    p3 = 'The submitted property owner details provided do not match our current records, and we are unable to proceed with the application.';
    p4 = 'Please provide the property owner detail and correct email address (by return email) so we can update the application and proceed with assessment.';
  }
  return [
    { t: 'Hi ' + nm + ',', ref: false },
    { t: 'We are currently processing application ' + ref + ' submitted to us through our NPC submission portal. Our process now includes an email to the property owner notifying them of the collection of personal information and application authorisation confirmation.', ref: ref },
    { t: p3, ref: false },
    { t: p4, ref: false },
    { t: 'If we do not receive any response by ' + dateStr + ', the current application will be withdrawn and not proceed with assessment.', bold: true, ref: false, date: dateStr },
    { t: 'Please let me know if you have any questions or concerns.', ref: false }
  ];
}

function renderBody(v) {
  var paras = getBodyParas(v);
  var html = paras.map(function(p) {
    var h = p.ref ? hilite(p.t, p.ref) : esc(p.t);
    if (p.bold && p.date) {
      var ed = esc(p.date).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      h = h.replace(new RegExp('(' + ed + ')'), function(m) { return '<span class="date-highlight">' + m + '</span>'; });
      h = '<strong>' + h + '</strong>';
    }
    return '<div class="email-para">' + h + '</div>';
  }).join('');
  html += '<div class="sig-block">' + esc(SIG).replace(/\n/g, '<br>') + '</div>';
  return html;
}

function getPlainText(v) {
  var body = getBodyParas(v).map(function(p) { return p.t; }).join('\n\n');
  return body + '\n\n' + SIG;
}

function update() {
  var v = vals();
  var hasContent = !!(v.name || v.npc || v.cmp);
  var hasEmail = !!v.email;
  document.getElementById('open-btn').disabled = !hasEmail;
  document.getElementById('mail-hint').textContent = hasContent
    ? (hasEmail ? 'BCC: basubmission_watersewer@iconwater.com.au' : 'Add applicant email to enable')
    : 'Fill in details on the left to generate draft';
  var body = document.getElementById('email-body');
  if (hasContent) {
    var preview = document.createElement('div');
    preview.className = 'email-preview';
    preview.innerHTML = renderBody(v);
    body.innerHTML = '';
    body.appendChild(preview);
  } else {
    body.innerHTML = '<div class="empty-state">Your email preview will appear here.</div>';
  }
}

function copyText(text, btnId) {
  navigator.clipboard.writeText(text).then(function() {
    var btn = document.getElementById(btnId);
    var orig = btn.textContent;
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(function() { btn.textContent = orig; btn.classList.remove('copied'); }, 1800);
  });
}

function copyEmail() { copyText(getPlainText(vals()), 'copy-email-btn'); }

function openInMail() {
  var v = vals();
  if (!v.email) return;
  window.location.href = 'mailto:' + encodeURIComponent(v.email)
    + '?subject=' + encodeURIComponent(getSubject(v))
    + '&bcc=' + encodeURIComponent('basubmission_watersewer@iconwater.com.au')
    + '&body=' + encodeURIComponent(getPlainText(v));
}

update();
</script>
</body>
</html>
